name = "treeseed-working-site"
compatibility_date = "2026-04-03"
compatibility_flags = ["nodejs_compat"]
main = "./.treeseed/generated/worker/index.js"
workers_dev = true
preview_urls = true

[assets]
directory = "./dist"

[[kv_namespaces]]
binding = "FORM_GUARD_KV"
id = "replace-with-form-guard-kv-id"
preview_id = "replace-with-form-guard-kv-preview-id"

[[kv_namespaces]]
binding = "SESSION"
id = "replace-with-session-kv-id"
preview_id = "replace-with-session-kv-preview-id"

[[d1_databases]]
binding = "SITE_DATA_DB"
database_name = "treeseed-working-site-data"
database_id = "replace-with-site-data-db-id"
preview_database_id = "replace-with-site-data-db-preview-id"
