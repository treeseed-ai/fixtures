name: TreeSeed Working Site
slug: treeseed-working-site
siteUrl: https://treeseed.dev
contactEmail: hello@treeseed.dev
hosting:
  kind: hosted_project
  registration: optional
  marketBaseUrl: https://api.treeseed.ai
  teamId: treeseed-working-site
  projectId: treeseed-working-site
cloudflare:
  accountId: fixture-cloudflare-account-id
  workerName: treeseed-working-site
  pages:
    projectName: treeseed-working-site
    previewProjectName: treeseed-working-site-staging
    productionBranch: main
    stagingBranch: staging
    buildOutputDir: dist
  r2:
    binding: TREESEED_CONTENT_BUCKET
    bucketName: treeseed-working-site-content
    manifestKeyTemplate: teams/{teamId}/published/common.json
    previewRootTemplate: teams/{teamId}/previews
    previewTtlHours: 168
plugins:
  - package: '@treeseed/sdk/plugin-default'
providers:
  forms: store_only
  agents:
    execution: stub
    mutation: local_branch
    repository: stub
    verification: stub
    notification: stub
    research: stub
  deploy: cloudflare
  content:
    runtime: team_scoped_r2_overlay
    publish: team_scoped_r2_overlay
    docs: default
  site: default
smtp:
  enabled: false
turnstile:
  enabled: true
